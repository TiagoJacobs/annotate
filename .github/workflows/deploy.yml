name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - staging

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Determine deploy target
        id: target
        run: |
          BRANCH="${GITHUB_REF##*/}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_path=/annotate/$BRANCH/" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.target.outputs.base_path }}
          VITE_GOOGLE_CLIENT_ID: 343805148019-6g9b8di5if0v2hlllqikgkq8cse8smvv.apps.googleusercontent.com

      - name: Create root redirect
        if: steps.target.outputs.branch == 'main'
        run: |
          mkdir -p dist-root
          cat > dist-root/index.html << 'REDIRECT'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0;url=/annotate/main/">
            <link rel="canonical" href="/annotate/main/">
          </head>
          <body>
            <p>Redirecting to <a href="/annotate/main/">main</a>...</p>
          </body>
          </html>
          REDIRECT

      - name: Deploy branch build
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.target.outputs.branch }}
          keep_files: true

      - name: Deploy root redirect
        if: steps.target.outputs.branch == 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-root
          keep_files: true
